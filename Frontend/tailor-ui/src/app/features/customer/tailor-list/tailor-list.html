<app-navbar></app-navbar>

<div class="container">
  <h2>Available Tailors</h2>

  @for (tailor of tailors(); track tailor._id) {
    <div class="card">
      <div>
        <h3>{{ tailor.name }}</h3>
        <p><strong>Email</strong>{{ tailor.email }}</p>
        <p><strong>Phone</strong>{{ tailor.phone }}</p>
      </div>
      <button [routerLink]="['/customer/tailor', tailor._id]">View Profile</button>
    </div>
  } @empty {
    <p>No tailors found or data hasn't loaded yet.</p>
  }
</div>
