<div class="login-container">

  <h2>Login</h2>

  <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">

    <div>
      <label>Email</label>
      <input
        type="email"
        formControlName="email"
      />
    </div>

    <div>
      <label>Password</label>
      <input
        type="password"
        formControlName="password"
      />
    </div>

    <button type="submit">
      Login
    </button>
    <p>
  Don't have an account?
  <a routerLink="/register">Register</a>
</p>

  </form>

</div>
